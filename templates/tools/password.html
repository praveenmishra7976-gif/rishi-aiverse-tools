<!DOCTYPE html>
<html>
<head>
    <title>Password Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    🔐 Password Generator
</div>

<div class="hero">
    <h2>Create Strong Password</h2>

    <form method="POST">
        <input
            type="number"
            name="length"
            placeholder="Password Length"
            min="4"
            max="50"
            required
        >

        <br><br>

        <button type="submit">Generate Password</button>
    </form>

    {% if password %}
    <br><br>

    <input
        type="text"
        value="{{ password }}"
        readonly
        style="width:90%;padding:12px;font-size:18px;text-align:center;"
    >
    {% endif %}

    <br><br>

    <a href="/">⬅ Back to Home</a>

</div>

</body>
</html>
