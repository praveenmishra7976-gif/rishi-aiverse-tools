<!DOCTYPE html>
<html>
<head>
    <title>Age Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    🎂 Age Calculator
</div>

<div class="hero">

<h2>Calculate Your Age</h2>

<form method="POST">

<input
type="date"
name="dob"
required>

<br><br>

<button type="submit">
Calculate Age
</button>

</form>

{% if age is not none %}

<br>

<h2>Your Age: {{ age }} Years</h2>

{% endif %}

<br><br>

<a href="/">⬅ Back Home</a>

</div>

</body>
</html>
